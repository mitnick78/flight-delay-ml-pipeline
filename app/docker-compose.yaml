services:

  postgres_local:
    image: postgres:17
    container_name: flight_predictor_local_db
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres_local

  api:
    build: ./api
    container_name: flight_predictor_api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ../saved_models:/app/saved_models
    depends_on:
      - postgres_local
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres_local   
      DB_PORT: 5432             
    restart: unless-stopped

  front:
    build: ./front
    container_name: flight_predictor_front
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data: